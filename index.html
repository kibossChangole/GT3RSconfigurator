<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT3RS Configurator | Premium 3D</title>
    <link rel="stylesheet" href="src/style.css">
    <!-- Load modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- App Container -->
    <div id="main-ui">
        <header>
            <div class="logo">
                <h1>911 GT3RS</h1>
                <span>Configurator</span>
            </div>
        </header>

        <aside class="sidebar left">
            <div class="card">
                <h2>Performance</h2>
                <div class="stats">
                    <div class="stat">
                        <label>Top Speed</label>
                        <span>296 KM/H</span>
                    </div>
                    <div class="stat">
                        <label>0-100 KM/H</label>
                        <span>3.2 SEC</span>
                    </div>
                </div>
            </div>
        </aside>

        <aside class="sidebar right">
            <div class="card">
                <h2>Paint Finish</h2>
                <div class="color-grid">
                    <div class="color-btn" style="background: #ffffff;" onclick="changePaint('#ffffff')" title="White"></div>
                    <div class="color-btn" style="background: #e81b1b;" onclick="changePaint('#e81b1b')" title="Guards Red"></div>
                    <div class="color-btn" style="background: #111111;" onclick="changePaint('#111111')" title="Black"></div>
                    <div class="color-btn" style="background: #3acfd1;" onclick="changePaint('#3acfd1')" title="Miami Blue"></div>
                    <div class="color-btn" style="background: #f7e61c;" onclick="changePaint('#f7e61c')" title="Racing Yellow"></div>
                    <div class="color-btn" style="background: #004d40;" onclick="changePaint('#004d40')" title="Python Green"></div>
                    <div class="color-btn" style="background: #5d4037;" onclick="changePaint('#5d4037')" title="Sepia Brown"></div>
                    <div class="color-btn" style="background: #3949ab;" onclick="changePaint('#3949ab')" title="Gentian Blue"></div>
                </div>
            </div>

            <!--

            <div class="card">
                <h2>Equipment</h2>
                <div class="toggle-group">
                    <button class="action-btn" onclick="toggleSpoiler()">Toggle GT-Spoiler</button>
                </div>
            </div>

            <div class="card premium">
                <button class="buy-btn">Order My GT3RS</button>
            </div>
          -->
        </aside>


    </div>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <h2 id="progress-text">Starting Configurator...</h2>
        </div>
    </div>

    <!-- Three.js App Container (Rendered by main.js) -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
